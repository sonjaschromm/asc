*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0704;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Karla',sans-serif;overflow:hidden;}

.scene{
  width:600px;height:400px;position:relative;
  background:#0e0b05;border:1px solid rgba(184,146,58,.25);
  overflow:hidden;cursor:pointer;
}

/* dark veil that lifts */
.veil{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,#0a0704 0%,rgba(10,7,4,.9) 60%,rgba(10,7,4,.3) 100%);
  z-index:3;transition:opacity 1.8s ease;
}
.scene.revealed .veil{opacity:0;}

/* gold shimmer line */
.shimmer{
  position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(184,146,58,.08),transparent);
  z-index:2;animation:shimmer 3s ease 1s forwards;opacity:0;
}
@keyframes shimmer{
  0%{left:-100%;opacity:0;}
  20%{opacity:1;}
  100%{left:150%;opacity:0;}
}

/* top gold line */
.tl{
  position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,#b8923a,#f0d080,#b8923a,transparent);
  z-index:5;transform:scaleX(0);transition:transform 1.2s ease .3s;
}
.scene.revealed .tl{transform:scaleX(1);}

/* text layers */
.text-layer{
  position:absolute;inset:0;z-index:4;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:2.5rem;
  background:linear-gradient(to top,rgba(10,7,4,.9) 0%,transparent 60%);
}
.eyebrow{
  font-size:10px;letter-spacing:.35em;text-transform:uppercase;
  color:rgba(184,146,58,.8);margin-bottom:.8rem;
  opacity:0;transform:translateY(10px);
  transition:opacity .8s ease 1.2s,transform .8s ease 1.2s;
}
.scene.revealed .eyebrow{opacity:1;transform:translateY(0);}

.title{
  font-family:'Cormorant Garamond',serif;
  font-size:3.2rem;font-weight:300;line-height:1.05;
  color:#f5eed8;margin-bottom:.8rem;
  opacity:0;transform:translateY(15px);
  transition:opacity 1s ease 1.5s,transform 1s ease 1.5s;
}
.title em{font-style:italic;color:#d4aa5a;}
.scene.revealed .title{opacity:1;transform:translateY(0);}

.subtitle{
  font-size:14px;color:rgba(245,238,216,.55);line-height:1.6;
  opacity:0;transform:translateY(10px);
  transition:opacity .8s ease 2s,transform .8s ease 2s;
}
.scene.revealed .subtitle{opacity:1;transform:translateY(0);}

.cta{
  display:inline-block;margin-top:1.5rem;padding:.7rem 1.8rem;
  background:#b8923a;color:#0a0704;text-decoration:none;
  font-size:11px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;
  opacity:0;transition:opacity .8s ease 2.5s,background .2s;
}
.cta:hover{background:#d4aa5a;}
.scene.revealed .cta{opacity:1;}

/* click hint */
.hint{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:6;text-align:center;
  transition:opacity .5s;
}
.hint-ring{
  width:70px;height:70px;border-radius:50%;
  border:1.5px solid rgba(184,146,58,.5);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 0.8rem;
  animation:pulse 2s ease infinite;
}
@keyframes pulse{
  0%,100%{transform:scale(1);opacity:.8;}
  50%{transform:scale(1.1);opacity:1;}
}
.hint-icon{font-size:24px;color:#b8923a;}
.hint-text{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:rgba(184,146,58,.7);}
.scene.revealed .hint{opacity:0;pointer-events:none;}

/* cycling objects */
.obj-next{
  position:absolute;inset:0;opacity:0;
  background-size:cover;background-position:center;
  filter:sepia(30%) contrast(1.1) brightness(.7);
  transition:opacity 1.5s ease;
}
.obj-next.show{opacity:1;}
</style>

let cur=0;
document.getElementById('mainObj').style.backgroundImage='url('+imgs[0]+')';

function reveal(){
  document.getElementById('scene').classList.add('revealed');
  startCycle();
}

function startCycle(){
  setInterval(()=>{
    cur=(cur+1)%imgs.length;
    const next=document.getElementById('nextObj');
    next.style.backgroundImage='url('+imgs[cur]+')';
    next.classList.add('show');
    setTimeout(()=>{
      document.getElementById('mainObj').style.backgroundImage='url('+imgs[cur]+')';
      next.classList.remove('show');
    },1500);
  },4000);
}
