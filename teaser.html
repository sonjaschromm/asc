<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASC | Teaser</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Karla:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --g:#b8923a; --gl:#d4aa5a; --bg:#0a0704; --t:#f5eed8; --m:rgba(245,238,216,0.6);
}
body {
  background:var(--bg); min-height:100vh;
  font-family:'Karla',sans-serif; color:var(--t);
  display:flex; align-items:center; justify-content:center;
  padding:1rem;
}

/* SPLIT BACKGROUND */
.split {
  position:fixed; inset:0; z-index:0;
  display:grid; grid-template-columns:1fr 1fr;
}
.split-left, .split-right {
  position:relative; overflow:hidden;
}
.split-slide {
  position:absolute; inset:0;
  background-size:cover; background-position:center top;
  opacity:0; transition:opacity 1.2s ease;
}
.split-slide.active { opacity:1; }
.split-left .split-slide { filter:brightness(.45) sepia(20%); }
.split-right .split-slide { filter:brightness(.4) sepia(25%); }

/* gold divider */
.split-divider {
  position:fixed; left:50%; top:0; bottom:0;
  width:2px; transform:translateX(-50%); z-index:2;
  background:linear-gradient(to bottom, transparent, var(--g) 20%, #f0d080 50%, var(--g) 80%, transparent);
  opacity:.8;
}

/* dark overlay */
.ov {
  position:fixed; inset:0; z-index:1;
  background:rgba(10,7,4,0.35);
}

/* CARD */
.card {
  position:relative; z-index:3;
  width:100%; max-width:560px;
  background:rgba(10,7,4,0.72);
  border:1px solid rgba(184,146,58,0.28);
  backdrop-filter:blur(12px);
  overflow:hidden;
  box-shadow:0 8px 80px rgba(0,0,0,.7), 0 0 120px rgba(184,146,58,.06);
  animation:up .8s ease both;
}
@keyframes up { from{opacity:0;transform:translateY(24px);} to{opacity:1;transform:translateY(0);} }
.tl {
  height:3px;
  background:linear-gradient(90deg,transparent,var(--g),#f0d080,var(--g),transparent);
}

/* LABEL STRIP */
.label-strip {
  padding:.8rem 2rem;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid rgba(184,146,58,.15);
}
.label-left { font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(--g); opacity:.75; }
.label-right { font-size:10px; letter-spacing:.1em; color:var(--m); }

/* PORTRAIT STRIP */
.portrait-strip {
  height:220px; position:relative; overflow:hidden;
  border-bottom:1px solid rgba(184,146,58,.15);
}
.portrait-slide {
  position:absolute; inset:0;
  background-size:cover; background-position:center top;
  opacity:0; transition:opacity 1.2s ease;
}
.portrait-slide.active { opacity:1; }
.portrait-gradient {
  position:absolute; inset:0;
  background:linear-gradient(to bottom, transparent 40%, rgba(10,7,4,.85));
  z-index:1;
}
.portrait-caption {
  position:absolute; bottom:1.2rem; left:1.5rem; z-index:2;
  font-family:'Cormorant Garamond',serif;
  font-size:1rem; font-style:italic; color:rgba(245,238,216,.7);
}

/* TITLE */
.title-sec {
  padding:2rem 2rem 1.5rem;
  text-align:center;
  border-bottom:1px solid rgba(184,146,58,.15);
}
h1 {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2.4rem,8vw,3.2rem); font-weight:300;
  line-height:1.05; color:var(--t);
}
h1 em { font-style:italic; color:var(--gl); }
.tagline {
  font-size:clamp(13px,3vw,15px); color:var(--m);
  line-height:1.7; margin-top:1rem;
  max-width:380px; margin-left:auto; margin-right:auto;
}

/* OBJECT STRIP */
.obj-strip {
  display:flex; gap:2px;
  height:clamp(70px,15vw,100px);
  border-bottom:1px solid rgba(184,146,58,.15);
}
.obj-thumb {
  flex:1; background-size:cover; background-position:center;
  filter:sepia(25%) brightness(.8); transition:filter .3s; cursor:zoom-in;
}
.obj-thumb:hover { filter:sepia(0%) brightness(1); }

/* STATS */
.stats {
  display:grid; grid-template-columns:repeat(3,1fr);
  border-bottom:1px solid rgba(184,146,58,.15);
}
.stat {
  padding:1.2rem .8rem; text-align:center;
  border-right:1px solid rgba(184,146,58,.15);
}
.stat:last-child { border-right:none; }
.stat-n {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(1.6rem,4vw,2.2rem); font-weight:300; color:var(--gl); line-height:1;
}
.stat-l { font-size:9px; letter-spacing:.15em; text-transform:uppercase; color:var(--m); margin-top:4px; }

/* CTA */
.cta { padding:1.5rem 2rem; text-align:center; }
.sub-btn {
  display:inline-block; padding:.9rem 2.5rem;
  background:var(--g); color:#0a0704; text-decoration:none;
  font-family:'Karla',sans-serif; font-size:12px; letter-spacing:.2em;
  text-transform:uppercase; font-weight:600; transition:background .2s;
  width:100%; text-align:center;
}
.sub-btn:hover { background:var(--gl); }

/* BACK */
.back-wrap { position:relative; z-index:3; max-width:560px; width:100%; margin-bottom:1rem; }
.back {
  display:inline-flex; align-items:center; gap:.5rem;
  font-size:11px; letter-spacing:.2em; text-transform:uppercase;
  color:var(--g); text-decoration:none; opacity:.8;
}

/* LIGHTBOX */
#lb { display:none; position:fixed; inset:0; background:rgba(0,0,0,.93); z-index:999; align-items:center; justify-content:center; cursor:zoom-out; }
#lb.on { display:flex; }
#lb img { max-width:90vw; max-height:90vh; border:2px solid var(--g); }

/* MOBILE */
@media(max-width:480px) {
  .split { grid-template-columns:1fr 1fr; }
  .portrait-strip { height:180px; }
  .label-strip { padding:.7rem 1.5rem; }
  .title-sec { padding:1.5rem 1.5rem 1.2rem; }
  .cta { padding:1.2rem 1.5rem; }
}

.page-wrap {
  display:flex; flex-direction:column; align-items:center;
  width:100%; max-width:560px; padding:.5rem;
}
</style>
</head>

const portCaptions = [
  "Alex Schütz — Vienna, Stephansdom",
  "Alex Schütz — with the collection",
  "Alex Schütz",
  "Alex Schütz",
  "Sonja Schromm",
  "Sonja Schromm",
  "Sonja Schromm",
  "Sonja Schromm",
  "Alex & Sonja"
];

// Build portrait slides
const ps = document.getElementById('portStrip');
portraits.forEach((src, i) => {
  const div = document.createElement('div');
  div.className = 'portrait-slide' + (i===0?' active':'');
  div.style.backgroundImage = `url(${src})`;
  div.style.cursor = 'zoom-in';
  div.onclick = () => { document.getElementById('lbi').src=src; document.getElementById('lb').classList.add('on'); };
  ps.insertBefore(div, ps.firstChild);
});

// Build split BG left = objects, right = portraits
const leftEl = document.getElementById('splitLeft');
const rightEl = document.getElementById('splitRight');

objects.forEach((src, i) => {
  const d = document.createElement('div');
  d.className = 'split-slide' + (i===0?' active':'');
  d.style.backgroundImage = `url(${src})`;
  leftEl.appendChild(d);
});

portraits.forEach((src, i) => {
  const d = document.createElement('div');
  d.className = 'split-slide' + (i===0?' active':'');
  d.style.backgroundImage = `url(${src})`;
  rightEl.appendChild(d);
});

// Build object thumbnails
const os = document.getElementById('objStrip');
objects.slice(0,5).forEach(src => {
  const d = document.createElement('div');
  d.className = 'obj-thumb';
  d.style.backgroundImage = `url(${src})`;
  d.onclick = () => { document.getElementById('lbi').src=src; document.getElementById('lb').classList.add('on'); };
  os.appendChild(d);
});

// Animate
let pi=0, oi=0;
const pSlides = document.querySelectorAll('#portStrip .portrait-slide');
const lSlides = leftEl.querySelectorAll('.split-slide');
const rSlides = rightEl.querySelectorAll('.split-slide');
const caption = document.getElementById('portCaption');

setInterval(() => {
  pSlides[pi%pSlides.length].classList.remove('active');
  lSlides[oi%lSlides.length].classList.remove('active');
  rSlides[pi%rSlides.length].classList.remove('active');
  pi = (pi+1) % pSlides.length;
  oi = (oi+1) % lSlides.length;
  pSlides[pi%pSlides.length].classList.add('active');
  lSlides[oi%lSlides.length].classList.add('active');
  rSlides[pi%rSlides.length].classList.add('active');
  caption.textContent = portCaptions[pi % portCaptions.length];
}, 3000);
</script>
